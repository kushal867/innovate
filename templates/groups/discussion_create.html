{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}New Discussion - {{ group.name }} - Nepal Community Platform{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-3xl">
    <div class="mb-8">
        <h1 class="text-4xl font-bold text-gray-800">Start a Discussion</h1>
        <p class="text-gray-600 mt-2">in {{ group.name }}</p>
    </div>

    <div class="bg-white rounded-lg shadow-md p-8">
        {% crispy form %}
    </div>

    <div class="mt-6">
        <a href="{% url 'groups:detail' group.slug %}" class="text-primary hover:text-blue-600 transition duration-200">
            <i class="fas fa-arrow-left mr-2"></i> Back to Group
        </a>
    </div>
</div>
{% endblock %}
