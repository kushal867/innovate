{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Edit Event - Nepal Community Platform{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-4xl">
    <div class="bg-white rounded-lg shadow-md p-8">
        <div class="mb-6">
            <h1 class="text-3xl font-bold text-gray-800 flex items-center">
                <i class="fas fa-edit text-primary mr-3"></i>Edit Event
            </h1>
            <p class="text-gray-600 mt-2">Update your event details</p>
        </div>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form|crispy }}
            
            <div class="flex gap-4 mt-6">
                <button type="submit" class="flex-1 bg-primary text-white px-6 py-3 rounded-lg hover:bg-blue-600 transition duration-200">
                    <i class="fas fa-save mr-2"></i>Update Event
                </button>
                <a href="{% url 'events:detail' event.pk %}" class="flex-1 bg-gray-500 text-white px-6 py-3 rounded-lg hover:bg-gray-600 transition duration-200 text-center">
                    <i class="fas fa-times mr-2"></i>Cancel
                </a>
            </div>
        </form>

        <div class="mt-6 pt-6 border-t border-gray-200">
            <a href="{% url 'events:delete' event.pk %}" class="text-red-600 hover:text-red-700 flex items-center">
                <i class="fas fa-trash-alt mr-2"></i>Delete this event
            </a>
        </div>
    </div>
</div>
{% endblock %}
